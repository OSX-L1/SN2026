                const cloneContainer = document.createElement('div');

                const originalTextareas = quoteRef.current.querySelectorAll('textarea');
                const clonedTextareas = clone.querySelectorAll('textarea');
                originalTextareas.forEach((orig, index) => {

             useEffect(() => {
                if (!db) return;

        const PVCStockChecker = ({ theme, onBack }) => {

            const [showSuggestions, setShowSuggestions] = useState(false);
            const [showAll, setShowAll] = useState(false);

            const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQz2OtjzRBmeUmLOTSgJ-Bt2woZPiR9QyzvIWcBXacheG3IplefFZE66yWYE43qVRQo2DAOPu9UClh5/pub?gid=1230787558&single=true&output=csv';
            const heightColumns = [ '2.00', '2.20', '2.40', '2.60', '2.80', '3.00', '3.20', '3.30', '3.50', '3.70', '3.75' ];

            useEffect(() => {
                setLoading(true);
                Papa.parse(SHEET_URL, {
                    download: true, header: false, skipEmptyLines: true,
                    complete: (results) => { setData(preprocessData(results.data)); setLoading(false); },
                    error: () => { setError('ไม่สามารถดึงข้อมูลสต็อกได้'); setLoading(false); }
                });
            }, []);

            const preprocessData = (rows) => {
                if (!rows || rows.length < 2) return [];
                let headerRowIndex = -1; let codeIdx = -1; let nameIdx = -1; let heightStartIdx = -1;
                for (let i = 0; i < Math.min(rows.length, 5); i++) {
                    const row = rows[i].map(cell => String(cell).trim().toLowerCase());
                    const hIdx = row.findIndex(c => c.includes('2.00') || c.includes('ความสูง'));
                    const cIdx = row.findIndex(c => c === 'code' || c === 'รหัส' || c.includes('product code') || c.includes('รหัสสินค้า'));
                    
                    if (hIdx !== -1 || cIdx !== -1) {
                        headerRowIndex = i; heightStartIdx = hIdx !== -1 ? hIdx : 2; codeIdx = cIdx !== -1 ? cIdx : 0;
                        const nIdx = row.findIndex(c => c === 'name' || c === 'ชื่อ' || c.includes('product name') || c.includes('ชื่อสินค้า'));
                        nameIdx = nIdx !== -1 ? nIdx : (codeIdx === 0 ? 1 : 0);
                        if (nameIdx === codeIdx) nameIdx = codeIdx + 1;
                        break;
                    }
                }
                if (headerRowIndex === -1) { headerRowIndex = 0; codeIdx = 0; nameIdx = 1; heightStartIdx = 2; }
                const processed = []; let currentRow = null;
                for (let i = headerRowIndex + 1; i < rows.length; i++) {
                    const row = rows[i]; if (!row || row.length < 2) continue;
                    const rawCode = row[codeIdx]; const rawName = row[nameIdx];
                    if (rawCode && String(rawCode).trim().length > 0) {
                        currentRow = { code: String(rawCode).trim(), name: rawName ? String(rawName).trim() : 'Unknown', stock: {} };
                        heightColumns.forEach((hKey, index) => {
                            const colIdx = heightStartIdx + index;
                            if (colIdx < row.length) {
                                const valStr = String(row[colIdx] || '').replace(/,/g, '').trim();
                                const val = parseFloat(valStr);
                                currentRow.stock[hKey] = !isNaN(val) ? val : 0;
                            } else { currentRow.stock[hKey] = 0; }
                        });
                        processed.push(currentRow);
                    } else if (currentRow) {
                         heightColumns.forEach((hKey, index) => {
                            const colIdx = heightStartIdx + index;
                            if (colIdx < row.length) {
                                const valStr = String(row[colIdx] || '').replace(/,/g, '').trim();
                                const val = parseFloat(valStr);
                                if (!isNaN(val)) currentRow.stock[hKey] = (currentRow.stock[hKey] || 0) + val;
                            }
                        });
                    }
                }
                return processed;
            };

                                        <div className="flex flex-col"><span className="font-bold text-slate-700">{item.code}</span><span className="text-[10px] text-slate-400">{item.name}</span></div>

                                 <div className="flex-1 overflow-auto p-0">
                                    <table className="w-full text-sm border-collapse border border-slate-200">
                                        <thead className="bg-slate-100 sticky top-0 shadow-sm z-10 text-slate-600"><tr><th className="p-3 text-left bg-slate-100 min-w-[150px] border border-slate-300">สินค้า (รหัส/ชื่อ)</th>{heightColumns.map((h, i) => <th key={i} className="p-3 text-center whitespace-nowrap bg-slate-100 border border-slate-300">{h} ม.</th>)}</tr></thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {data.filter(item => item.name !== 'Unknown').map((item, i) => (
                                                <tr key={i} className="hover:bg-slate-50 transition-colors"><td className="p-3 border border-slate-200 align-top"><div className="text-lg font-black text-slate-800 font-mono tracking-tight">{item.code}</div><div className="text-xs text-slate-500 mt-0.5">{item.name}</div></td>
                                                    {heightColumns.map((hKey, j) => {
                                                        const val = item.stock[hKey]; const hasStock = val > 0;
                                                        return <td key={j} className={`p-3 text-center border border-slate-200 align-middle ${hasStock ? 'text-green-600 font-bold bg-green-50/20' : 'bg-red-50/10'}`}>{hasStock ? val : <span className="text-red-500 text-[10px] font-bold">สินค้าหมด</span>}</td>

                            </div>

                    {searchResult && (

                                <div className={`${theme.bgSoft} p-5 border-b border-white/50`}><h3 className={`text-4xl font-black ${theme.textMain} font-mono tracking-tight`}>{searchResult.code}</h3><p className={`text-sm ${theme.textSub} mt-2 font-medium`}>{searchResult.name}</p></div>

                                        )
                                    })}

                            </div>
                        </div>

                </div>

                                if (!fetched.customRails || fetched.customRails.length === 0) { fetched.customRails = DEFAULT_CONFIG.customRails; }
                                if (!fetched.woodenTypes) { fetched.woodenTypes = [ { id: 'wood_basswood', label: 'BASSWOOD', price: fetched.basswoodPrice || 789 }, { id: 'wood_fauxwood', label: 'FAUX WOOD', price: fetched.fauxwoodPrice || 750 } ]; }
                                if (!fetched.pvcTypes) { fetched.pvcTypes = [ { id: 'pvc_85_solid', label: 'ใบ 8.5cm แบบทึบ', price: fetched.pvc85SolidPrice || 320 }, { id: 'pvc_85_japan', label: 'ใบ 8.5cm ญี่ปุ่น', price: fetched.pvc85JapanPrice || 699 }, { id: 'pvc_10_solid', label: 'ใบ 10cm แบบทึบ', price: fetched.pvc10SolidPrice || 290 }, { id: 'pvc_10_japan', label: 'ใบ 10cm ญี่ปุ่น', price: fetched.pvc10JapanPrice || 699 }, { id: 'pvc_euro_la', label: 'ใบ 12.3cm ยูโร LA', price: fetched.pvcEuroLAPrice || 730 }, { id: 'pvc_euro_lb', label: 'ใบ 12.3cm ยูโร LB', price: fetched.pvcEuroLBPrice || 730 }, { id: 'pvc_euro_zigzag', label: 'ใบ 12.3cm ยูโร สลับฟันปลา', price: fetched.pvcEuroZigzagPrice || 730 } ]; }
                                setConfig({ ...DEFAULT_CONFIG, ...fetched }); 
                            } else {
                                configRef.set(DEFAULT_CONFIG).catch(console.error); 
                            }
                        }, () => loadLocal());
                        
                        const profileRef = db.doc(`artifacts/${appId}/users/${currentUser.uid}/profile/info`);
                        profileRef.onSnapshot(doc => { setUserProfile(doc.exists ? doc.data() : null); });
                        const aluminumRef = db.doc(`artifacts/${appId}/public/data/price_tables/aluminum`);
                        aluminumRef.onSnapshot(doc => { if(doc.exists) setAluminumPrices(doc.data()); });
                    } else { loadLocal(); setUserProfile(null); }
                });
                return () => unsubscribeAuth();
            }, []);

            const saveConfig = async (newConfig) => { setConfig(newConfig); if (db && user) { try { await db.doc(`artifacts/${appId}/public/data/config/main`).set(newConfig); } catch (e) { alert('บันทึกออนไลน์ไม่สำเร็จ บันทึกในเครื่องแทน'); localStorage.setItem('blindAppConfig', JSON.stringify(newConfig)); } } else { localStorage.setItem('blindAppConfig', JSON.stringify(newConfig)); alert('บันทึกในเครื่องเรียบร้อย (โหมดออฟไลน์)'); } };
            const saveAluminumTable = async (data) => { if (db && user) { try { await db.doc(`artifacts/${appId}/public/data/price_tables/aluminum`).set(data); alert('บันทึกตารางราคาเรียบร้อย'); } catch (e) { alert("บันทึกตารางราคาไม่สำเร็จ: " + e.message); } } else { alert("กรุณาเข้าสู่ระบบก่อนบันทึก"); } }
            const saveUserProfile = async (newProfile) => { if (db && user) { try { await db.doc(`artifacts/${appId}/users/${user.uid}/profile/info`).set(newProfile, { merge: true }); alert("บันทึกข้อมูลโปรไฟล์เรียบร้อย"); } catch (e) { alert("บันทึกโปรไฟล์ไม่สำเร็จ: " + e.message); } } };
            const loadQuotation = (savedItems) => { setItems(savedItems); setShowProfile(false); setActiveTab('calculator'); };

            return (
                <div className={`min-h-screen pb-24 ${currentTheme.textMain}`}>
                    
                    {showSplash && (
                        <SplashScreen isFading={isSplashFading} theme={currentTheme} />
                    )}

                    <div className={`max-w-md mx-auto min-h-screen relative ${currentTheme.bgApp} sm:shadow-2xl sm:my-4 sm:rounded-[40px] sm:min-h-[calc(100vh-2rem)] overflow-hidden border border-white/50 transition-colors duration-500`}>
                        <div className={`h-16 w-full absolute top-0 z-30 flex justify-between items-center px-6 sticky ${config.theme === 'apple' ? 'glass' : 'bg-white/95 backdrop-blur-sm shadow-sm'}`}>
                            <div className="flex items-center gap-2">
                                {activeTab !== 'home' && (
                                    <div className="flex items-center">
                                        <img 
                                            src={config.logoUrl} 
                                            alt="Logo" 
                                            className="h-14 w-auto object-contain drop-shadow-sm fade-in" 
                                            style={{filter: currentTheme.logoFilter}} 
                                            onError={(e) => {
                                                e.target.style.display = 'none';
                                                e.target.nextSibling.style.display = 'flex';
                                            }} 
                                        />
                                        <div style={{display: 'none'}} className="items-center justify-center fade-in">
                                            <ModernLogo size={42} />
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-3">
                                {user ? (
                                    <button className="flex items-center gap-2 focus:outline-none hover:scale-105 transition-transform" onClick={() => setShowProfile(true)}>
                                        <img src={userProfile?.photoURL || user.photoURL} className="w-9 h-9 rounded-full border-2 border-white shadow-sm" alt="User" />
                                    </button>
                                ) : (
                                    <button onClick={handleLogin} className={`flex items-center gap-2 text-sm font-bold bg-white px-5 py-2.5 rounded-full shadow-md hover:shadow-lg transition-all active:scale-95 border ${currentTheme.border}`}>
                                        <Icons.Google size={28} className="text-red-600" /> <span className={currentTheme.textMain}>เข้าสู่ระบบ</span>
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        {activeTab === 'home' && <HomePage setActiveTab={setActiveTab} config={config} onInstall={handleInstallApp} theme={currentTheme} />}
                        {activeTab === 'stock' && <StockPage theme={currentTheme} />}
                        {activeTab === 'calculator' && <CalculatorPage config={config} items={items} setItems={setItems} user={user} onLogin={handleLogin} userProfile={userProfile} theme={currentTheme} aluminumPrices={aluminumPrices} />}
                        
                        <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-[380px] rounded-3xl p-2 flex justify-around items-center z-50 ${config.theme === 'apple' ? 'glass-panel' : 'bg-white/90 backdrop-blur-lg shadow-lg border border-gray-100'}`}>
                            <NavButton active={activeTab === 'home'} onClick={() => setActiveTab('home')} icon={<Icons.Home size={24} />} label="หน้าหลัก" theme={currentTheme} />
                            <NavButton active={activeTab === 'stock'} onClick={() => setActiveTab('stock')} icon={<Icons.Box size={24} />} label="สต็อก" theme={currentTheme} />
                            <NavButton active={activeTab === 'calculator'} onClick={() => setActiveTab('calculator')} icon={<Icons.Calculator size={24} />} label="คำนวณ" theme={currentTheme} />
                            <NavButton active={showAdmin} onClick={() => setShowAdmin(true)} icon={<Icons.Settings size={24} />} label="ตั้งค่า" theme={currentTheme} />
                        </div>
                        
                        {showAdmin && (<AdminModal isOpen={showAdmin} onClose={() => setShowAdmin(false)} isLoggedIn={isAdminLoggedIn} setLoggedIn={setIsAdminLoggedIn} config={config} onSave={saveConfig} theme={currentTheme} onSaveAluminum={saveAluminumTable} aluminumPrices={aluminumPrices} />)}
                        {showProfile && user && (<ProfileModal user={user} userProfile={userProfile} onClose={() => setShowProfile(false)} onLogout={handleLogout} onLoad={loadQuotation} onSaveProfile={saveUserProfile} theme={currentTheme} />)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="/_vercel/insights/script.js"></script>
</body>
</html>
